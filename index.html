<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B2B Wholesale Marketplace</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
<div class="logo">BulkMarket</div>

<input type="text" id="searchInput" placeholder="Search wholesale products...">

<button onclick="openSupplierForm()">Become Supplier</button>
</header>

<section class="hero">
<h1>India Wholesale Marketplace</h1>
<p>Connect with manufacturers & wholesalers</p>
</section>

<section class="products">
<h2>Wholesale Products</h2>
<div id="productList" class="product-grid"></div>
</section>

<!-- Supplier Form -->
<div id="supplierModal" class="modal">
<div class="modal-content">

<span class="close" onclick="closeSupplierForm()">×</span>

<h2>Add Wholesale Product</h2>

<input id="supplierName" placeholder="Business Name">
<input id="productName" placeholder="Product Name">
<input id="price" placeholder="Price per piece">
<input id="moq" placeholder="Minimum Order Quantity">
<input id="location" placeholder="Location">
<input id="whatsapp" placeholder="WhatsApp Number">
<input id="image" placeholder="Image URL">

<button onclick="addProduct()">Add Product</button>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
